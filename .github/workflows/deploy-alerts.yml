name: Deploy alerts function

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/alerts/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-alerts.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-supabase-alerts
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Check required secrets
        shell: bash
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || {
            echo "Missing GitHub secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          }
          test -n "$SUPABASE_PROJECT_REF" || {
            echo "Missing GitHub secret: SUPABASE_PROJECT_REF"
            exit 1
          }

      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.50.5

      - name: Deploy alerts to Supabase
        run: >-
          supabase functions deploy alerts
          --project-ref "$SUPABASE_PROJECT_REF"
          --no-verify-jwt
