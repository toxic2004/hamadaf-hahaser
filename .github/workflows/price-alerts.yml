name: Price alerts schedule

on:
  workflow_dispatch:

# Production scheduling runs inside Supabase with pg_cron. This workflow is
# retained only as an explicit manual fallback and no longer sends hourly noise.

jobs:
  invoke:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke Supabase alerts function
        env:
          ALERTS_URL: ${{ secrets.SUPABASE_ALERTS_URL }}
          SCHEDULE_SECRET: ${{ secrets.SUPABASE_ALERTS_SCHEDULE_SECRET }}
        run: |
          test -n "$ALERTS_URL"
          test -n "$SCHEDULE_SECRET"
          curl --fail --silent --show-error \
            --request POST \
            --header "content-type: application/json" \
            --header "x-schedule-secret: $SCHEDULE_SECRET" \
            --data '{"mode":"schedule"}' \
            "$ALERTS_URL"
