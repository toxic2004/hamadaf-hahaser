<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#285f50">
<title>זיהוי כריכת ספר | המדף החסר</title>
<style>
:root{--ink:#17352d;--muted:#6d7f79;--paper:#f5f1e8;--card:#fffdf8;--green:#285f50;--green2:#dcebe4;--danger:#a94a45;--line:#e4ded2;--shadow:0 12px 35px rgba(33,58,48,.11)}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:Arial,sans-serif;min-height:100vh}.shell{max-width:760px;margin:auto;padding:18px 14px 50px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}.brand{display:flex;align-items:center;gap:12px}.logo{width:48px;height:48px;border-radius:15px;background:var(--green);color:#fff;display:grid;place-items:center;font-size:25px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:var(--shadow)}h1,h2{margin:0}.sub{color:var(--muted);font-size:14px;line-height:1.5}.field{margin:14px 0}.field label{display:block;font-weight:700;font-size:13px;margin-bottom:6px}.field input,.field textarea{width:100%;border:1px solid var(--line);border-radius:13px;padding:13px;background:#fff;font:inherit}.field textarea{min-height:90px;resize:vertical}button,a.button{border:0;border-radius:13px;padding:12px 14px;font:inherit;cursor:pointer;text-decoration:none;text-align:center}.primary{background:var(--green);color:#fff;font-weight:700}.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.actions>*{flex:1;min-width:140px}.message{display:none;margin:12px 0;padding:11px;border-radius:12px;background:var(--green2)}.message.error{background:#fbe7e5;color:var(--danger)}.preview{display:grid;grid-template-columns:150px 1fr;gap:14px;align-items:start}.preview img{width:150px;height:210px;object-fit:contain;background:#eee;border-radius:12px}.results{display:grid;gap:10px;margin-top:14px}.result{display:grid;grid-template-columns:70px 1fr auto;gap:12px;align-items:center;padding:10px;border:1px solid var(--line);border-radius:14px;background:#fff}.result img{width:70px;height:95px;object-fit:contain;background:#eee;border-radius:8px}.hidden{display:none!important}@media(max-width:560px){.preview{grid-template-columns:1fr}.preview img{width:100%;height:260px}.result{grid-template-columns:58px 1fr}.result img{width:58px;height:82px}.result button{grid-column:1/-1}.card{padding:16px}}
</style>
</head>
<body>
<main class="shell">
<header class="top"><div class="brand"><div class="logo">▥</div><div><h1>זיהוי כריכה</h1><div class="sub">צלם או העלה תמונת כריכה והמערכת תנסה לזהות את הספר</div></div></div><a class="button ghost" href="./">חזרה למדף</a></header>
<section class="card">
<div class="field"><label for="coverFile">צילום או העלאת כריכה</label><input id="coverFile" type="file" accept="image/*" capture="environment"></div>
<div id="previewWrap" class="preview hidden"><img id="preview" alt="תצוגת הכריכה"><div><div class="field"><label for="recognizedText">טקסט שזוהה</label><textarea id="recognizedText" placeholder="הטקסט שיופק מהכריכה יופיע כאן"></textarea></div><div class="actions"><button id="recognize" class="primary">זיהוי טקסט וחיפוש</button><button id="searchManual" class="ghost">חיפוש לפי הטקסט</button></div></div></div>
<div id="message" class="message" aria-live="polite"></div>
<div id="results" class="results"></div>
</section>
</main>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
const $=id=>document.getElementById(id);
let selectedFile=null;
function showMessage(text,error=false){const el=$('message');el.textContent=text;el.className='message'+(error?' error':'');el.style.display=text?'block':'none'}
function escapeHtml(value){return String(value||'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
function normalizeQuery(text){return String(text||'').replace(/\s+/g,' ').replace(/[^\u0590-\u05FFa-zA-Z0-9 .,'"-]/g,' ').trim().slice(0,180)}
async function searchBooks(){const query=normalizeQuery($('recognizedText').value);if(query.length<2)return showMessage('לא זוהה מספיק טקסט לחיפוש.',true);showMessage('מחפש התאמות לספר...');$('results').innerHTML='';try{const response=await fetch('https://www.googleapis.com/books/v1/volumes?q='+encodeURIComponent(query)+'&maxResults=8');if(!response.ok)throw new Error('HTTP '+response.status);const data=await response.json();const items=Array.isArray(data.items)?data.items:[];if(!items.length)return showMessage('לא נמצאו התאמות. אפשר לערוך את הטקסט ולנסות שוב.',true);$('results').innerHTML=items.map((item,index)=>{const info=item.volumeInfo||{};const title=info.title||'ללא שם';const authors=Array.isArray(info.authors)?info.authors.join(', '):'מחבר לא ידוע';const image=info.imageLinks&&(info.imageLinks.thumbnail||info.imageLinks.smallThumbnail)||'';const isbn=(info.industryIdentifiers||[]).map(x=>x.identifier).find(Boolean)||'';return '<article class="result"><img src="'+escapeHtml(image.replace('http://','https://'))+'" alt=""><div><strong>'+escapeHtml(title)+'</strong><div class="sub">'+escapeHtml(authors)+(isbn?' · ISBN '+escapeHtml(isbn):'')+'</div></div><button class="primary" data-index="'+index+'">בחירה</button></article>'}).join('');$('results').querySelectorAll('button[data-index]').forEach(button=>button.onclick=()=>selectResult(items[Number(button.dataset.index)]));showMessage('נמצאו '+items.length+' התאמות. בחר את הספר הנכון.')}catch(error){console.error(error);showMessage('החיפוש נכשל. בדוק חיבור לאינטרנט ונסה שוב.',true)}}
function selectResult(item){const info=item.volumeInfo||{};const payload={title:info.title||'',author:Array.isArray(info.authors)?info.authors.join(', '):'',cover:info.imageLinks&&(info.imageLinks.thumbnail||info.imageLinks.smallThumbnail)||'',isbn:(info.industryIdentifiers||[]).map(x=>x.identifier).find(Boolean)||''};sessionStorage.setItem('recognizedBook',JSON.stringify(payload));showMessage('הספר נבחר. חוזר למדף כדי להוסיף אותו.');location.href='./?recognized=1'}
$('coverFile').addEventListener('change',event=>{selectedFile=event.target.files&&event.target.files[0]||null;if(!selectedFile){$('previewWrap').classList.add('hidden');return}if(!selectedFile.type.startsWith('image/')){selectedFile=null;return showMessage('צריך לבחור קובץ תמונה.',true)}$('preview').src=URL.createObjectURL(selectedFile);$('previewWrap').classList.remove('hidden');$('results').innerHTML='';showMessage('התמונה נטענה. לחץ על זיהוי טקסט וחיפוש.')});
$('recognize').onclick=async()=>{if(!selectedFile)return showMessage('צריך לצלם או לבחור תמונת כריכה.',true);if(!window.Tesseract)return showMessage('רכיב זיהוי הטקסט לא נטען. רענן את הדף ונסה שוב.',true);$('recognize').disabled=true;showMessage('מזהה טקסט מהכריכה...');try{const result=await Tesseract.recognize(selectedFile,'heb+eng',{logger:progress=>{if(progress.status==='recognizing text')showMessage('מזהה טקסט: '+Math.round((progress.progress||0)*100)+'%')}});$('recognizedText').value=normalizeQuery(result&&result.data&&result.data.text||'');if(!$('recognizedText').value)return showMessage('לא הצלחתי לזהות טקסט ברור. נסה תמונה חדה וישרה יותר.',true);await searchBooks()}catch(error){console.error(error);showMessage('זיהוי הטקסט נכשל. נסה תמונה אחרת.',true)}finally{$('recognize').disabled=false}};
$('searchManual').onclick=searchBooks;
</script>
</body>
</html>
