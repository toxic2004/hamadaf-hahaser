<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#285f50">
<title>הוספת ספר לפי ISBN | המדף החסר</title>
<style>
:root{--ink:#17352d;--muted:#6d7f79;--paper:#f5f1e8;--card:#fffdf8;--green:#285f50;--green2:#dcebe4;--gold:#c7903b;--danger:#a94a45;--line:#e4ded2;--shadow:0 12px 35px rgba(33,58,48,.11)}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:Arial,sans-serif;min-height:100vh}.shell{max-width:650px;margin:auto;padding:18px 14px 50px}.top{display:flex;align-items:center;gap:12px;margin-bottom:16px}.logo{width:48px;height:48px;border-radius:15px;background:var(--green);color:white;display:grid;place-items:center;font-size:25px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:var(--shadow)}h1,h2{margin:0}.sub{color:var(--muted);font-size:14px;line-height:1.5}.field{margin:14px 0}.field label{display:block;font-weight:700;font-size:13px;margin-bottom:6px}.field input,.field textarea{width:100%;border:1px solid var(--line);border-radius:13px;padding:13px;background:white;font:inherit}.field textarea{min-height:90px;resize:vertical}.row{display:grid;grid-template-columns:1fr auto;gap:8px}button,a.button{border:0;border-radius:13px;padding:12px 14px;font:inherit;cursor:pointer;text-decoration:none;text-align:center}.primary{background:var(--green);color:white;font-weight:700}.ghost{background:white;color:var(--ink);border:1px solid var(--line)}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.actions>*{flex:1;min-width:130px}.message{margin:12px 0;padding:11px;border-radius:12px;background:var(--green2);display:none}.message.error{background:#fbe7e5;color:var(--danger)}.preview{display:grid;grid-template-columns:110px 1fr;gap:14px;align-items:start;margin-top:14px}.preview img{width:110px;height:155px;object-fit:contain;background:#eee;border-radius:12px}.overlay{position:fixed;inset:0;background:rgba(17,35,29,.65);display:none;align-items:center;justify-content:center;padding:14px;z-index:20}.overlay.open{display:flex}.modal{background:var(--card);width:min(560px,100%);border-radius:22px;padding:18px}.head{display:flex;justify-content:space-between;align-items:center}.close{width:38px;height:38px;border-radius:50%;padding:0}.auth{margin-bottom:14px}.hidden{display:none!important}video{width:100%;min-height:280px;background:#111;border-radius:16px;margin-top:12px}@media(max-width:520px){.preview{grid-template-columns:85px 1fr}.preview img{width:85px;height:125px}.row{grid-template-columns:1fr}.shell{padding:12px}.card{padding:16px}}
</style>
</head>
<body>
<main class="shell">
<header class="top"><div class="logo">▥</div><div><h1>הוספה לפי ISBN</h1><div class="sub">חלק ממערכת המדף החסר</div></div></header>
<section id="authCard" class="card auth">
<h2>כניסה לחשבון</h2><p class="sub">השתמש באותו אימייל וסיסמה של המדף החסר.</p>
<div class="field"><label>אימייל</label><input id="email" type="email" autocomplete="email"></div>
<div class="field"><label>סיסמה</label><input id="password" type="password" autocomplete="current-password"></div>
<div class="actions"><button id="login" class="primary">כניסה</button><a class="button ghost" href="./">חזרה למדף</a></div>
</section>
<section id="appCard" class="card hidden">
<div class="head"><div><h2>ספר חדש</h2><div id="account" class="sub"></div></div><button id="logout" class="ghost">יציאה</button></div>
<div class="field"><label>ISBN-10 או ISBN-13</label><div class="row"><input id="isbn" inputmode="numeric" autocomplete="off" placeholder="לדוגמה 9781234567897"><button id="scan" class="ghost">סריקה במצלמה</button></div></div>
<div class="actions"><button id="lookup" class="primary">איתור פרטי הספר</button><button id="clear" class="ghost">ניקוי</button></div>
<div id="message" class="message" aria-live="polite"></div>
<div id="form" class="hidden">
<div class="preview"><img id="cover" alt="כריכת הספר"><div><div class="field"><label>שם הספר</label><input id="title"></div><div class="field"><label>שם המחבר</label><input id="author"></div></div></div>
<div class="field"><label>הערות</label><textarea id="notes"></textarea></div>
<div class="actions"><button id="save" class="primary">שמירה במדף החסר</button><a class="button ghost" href="./">פתיחת המדף</a></div>
</div>
</section>
</main>
<div id="scannerModal" class="overlay"><div class="modal"><div class="head"><h2>סריקת ברקוד</h2><button id="closeScanner" class="close ghost">×</button></div><p class="sub">כוון את המצלמה לברקוד שבגב הספר.</p><video id="video" playsinline muted autoplay></video></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@zxing/browser@0.1.5"></script>
<script>
const SUPABASE_URL='https://mfxhmnzyfhlaiqctchvb.supabase.co';
const SUPABASE_KEY='sb_publishable_joNTfIdJZ1t34wsl1S_d3g_aWmhHdaB';
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const ISBN_MARKER=/\n?\[ISBN:([0-9X-]+)\]\s*$/i;
let user=null,scannerControls=null,coverUrl='';
const $=id=>document.getElementById(id);
function clean(v){return String(v||'').toUpperCase().replace(/[^0-9X]/g,'')}
function valid10(v){v=clean(v);if(!/^\d{9}[\dX]$/.test(v))return false;return [...v].reduce((s,c,i)=>s+(c==='X'?10:+c)*(10-i),0)%11===0}
function valid13(v){v=clean(v);if(!/^\d{13}$/.test(v))return false;const s=[...v.slice(0,12)].reduce((a,c,i)=>a+(+c)*(i%2?3:1),0);return (10-s%10)%10===+v[12]}
function valid(v){v=clean(v);return v.length===10?valid10(v):valid13(v)}
function msg(text,error=false){$('message').textContent=text;$('message').className='message'+(error?' error':'');$('message').style.display=text?'block':'none'}
function reset(){stopScanner();$('isbn').value='';$('title').value='';$('author').value='';$('notes').value='';$('cover').removeAttribute('src');coverUrl='';$('form').classList.add('hidden');msg('')}
async function lookupBook(){const code=clean($('isbn').value);$('isbn').value=code;if(!valid(code))return msg('מספר ה ISBN אינו תקין.',true);msg('בודק אם הספר כבר נמצא ברשימה...');const {data,error}=await db.from('books').select('id,title,notes,status');if(error)return msg('לא ניתן לבדוק את הרשימה כרגע.',true);const duplicate=(data||[]).find(b=>{const m=String(b.notes||'').match(ISBN_MARKER);return m&&clean(m[1])===code&&b.status!=='סל מחזור'});if(duplicate)return msg('הספר כבר קיים ברשימה: '+duplicate.title,true);msg('מחפש את פרטי הספר...');try{const r=await fetch('https://www.googleapis.com/books/v1/volumes?q=isbn:'+encodeURIComponent(code));if(!r.ok)throw new Error();const p=await r.json(),item=p.items&&p.items[0];if(!item)return msg('לא נמצאו פרטים לספר. אפשר להזין ידנית.',true);const info=item.volumeInfo||{};$('title').value=(info.title||'')+(info.subtitle?': '+info.subtitle:'');$('author').value=Array.isArray(info.authors)?info.authors.join(', '):'';coverUrl=info.imageLinks&&(info.imageLinks.thumbnail||info.imageLinks.smallThumbnail)||'';if(coverUrl)$('cover').src=coverUrl.replace('http://','https://');else $('cover').removeAttribute('src');$('form').classList.remove('hidden');msg('הפרטים נמצאו. בדוק אותם לפני השמירה.')}catch(e){msg('החיפוש נכשל. אפשר להזין את פרטי הספר ידנית.',true);$('form').classList.remove('hidden')}}
async function saveBook(){const code=clean($('isbn').value),title=$('title').value.trim();if(!valid(code))return msg('מספר ה ISBN אינו תקין.',true);if(!title)return msg('צריך להזין שם ספר.',true);if(!user)return msg('צריך להתחבר מחדש.',true);$('save').disabled=true;$('save').textContent='שומר...';const visibleNotes=$('notes').value.trim();const storedNotes=(visibleNotes?visibleNotes+'\n':'')+'[ISBN:'+code+']';const row={id:crypto.randomUUID(),user_id:user.id,title,author:$('author').value.trim(),cover:coverUrl.replace('http://','https://'),notes:storedNotes,status:'מחפש',created_at:new Date().toISOString(),updated_at:new Date().toISOString()};const {error}=await db.from('books').insert(row);$('save').disabled=false;$('save').textContent='שמירה במדף החסר';if(error)return msg('השמירה נכשלה. '+(error.message||''),true);msg('הספר נשמר וסונכרן במדף החסר.');$('form').classList.add('hidden');$('isbn').value='';$('title').value='';$('author').value='';$('notes').value='';coverUrl=''}
function cameraErrorMessage(error){const name=error&&error.name||'';if(name==='NotAllowedError'||name==='SecurityError')return 'הגישה למצלמה נחסמה. פתח את הגדרות האתר בדפדפן ואפשר מצלמה, ואז נסה שוב.';if(name==='NotFoundError'||name==='DevicesNotFoundError')return 'לא נמצאה מצלמה במכשיר.';if(name==='NotReadableError'||name==='TrackStartError')return 'המצלמה נמצאת בשימוש על ידי אפליקציה אחרת. סגור אותה ונסה שוב.';if(name==='OverconstrainedError'||name==='ConstraintNotSatisfiedError')return 'לא נמצאה מצלמה אחורית מתאימה. נסה שוב לאחר רענון.';if(!window.isSecureContext)return 'המצלמה פועלת רק בחיבור מאובטח HTTPS.';if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)return 'הדפדפן הזה אינו מאפשר גישה למצלמה בעמוד זה.';if(!window.ZXingBrowser)return 'רכיב הסריקה לא נטען. בדוק את החיבור לאינטרנט ורענן את הדף.';return 'המצלמה לא נפתחה: '+(error&&error.message?error.message:'שגיאה לא מזוהה')}
async function startScanner(){msg('פותח את המצלמה...');if(!window.isSecureContext)return msg('המצלמה פועלת רק בחיבור מאובטח HTTPS.',true);if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)return msg('הדפדפן הזה אינו מאפשר גישה למצלמה בעמוד זה.',true);$('scannerModal').classList.add('open');try{if(!window.ZXingBrowser)throw Object.assign(new Error('ZXingBrowser לא נטען'),{name:'LibraryLoadError'});const reader=new ZXingBrowser.BrowserMultiFormatReader();scannerControls=await reader.decodeFromConstraints({video:{facingMode:{ideal:'environment'}},audio:false},$('video'),async(result,error)=>{if(result){const code=clean(result.getText());if(!valid(code))return;stopScanner();$('scannerModal').classList.remove('open');$('isbn').value=code;msg('הברקוד נסרק בהצלחה.');await lookupBook()}else if(error&&error.name!=='NotFoundException'){console.warn('Barcode scan error',error)}});msg('המצלמה פתוחה. כוון לברקוד ISBN בגב הספר.')}catch(e){console.error('Camera start failed',e);stopScanner();$('scannerModal').classList.remove('open');msg(cameraErrorMessage(e),true)}}
function stopScanner(){if(scannerControls){try{scannerControls.stop()}catch(e){}scannerControls=null}const v=$('video');if(v.srcObject){v.srcObject.getTracks().forEach(t=>t.stop());v.srcObject=null}}
async function showSession(session){user=session&&session.user||null;$('authCard').classList.toggle('hidden',!!user);$('appCard').classList.toggle('hidden',!user);if(user)$('account').textContent='מחובר כ '+user.email}
$('login').onclick=async()=>{const email=$('email').value.trim(),password=$('password').value;if(!email||!password)return alert('צריך להזין אימייל וסיסמה');$('login').disabled=true;const {data,error}=await db.auth.signInWithPassword({email,password});$('login').disabled=false;if(error)return alert('הכניסה נכשלה. בדוק את האימייל והסיסמה.');showSession(data.session)};
$('logout').onclick=()=>db.auth.signOut();$('lookup').onclick=lookupBook;$('save').onclick=saveBook;$('scan').onclick=startScanner;$('clear').onclick=reset;$('closeScanner').onclick=()=>{stopScanner();$('scannerModal').classList.remove('open');msg('הסריקה בוטלה.')};$('scannerModal').onclick=e=>{if(e.target===$('scannerModal')){$('closeScanner').click()}};
db.auth.getSession().then(({data})=>showSession(data.session));db.auth.onAuthStateChange((event,session)=>showSession(session));
</script>
</body>
</html>
