<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <meta name="theme-color" content="#285f50" />
    <title>המדף החסר</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="toast" class="toast"></div>
    <main class="shell">
      <header class="top">
        <div class="brand">
          <div class="logo">▥</div>
          <div>
            <h1>המדף החסר</h1>
            <div id="subtitle" class="sub">הספרים שאני מחפש</div>
          </div>
        </div>
        <div id="count" class="count"></div>
      </header>
      <div class="sync">
        <span id="syncText">מתחבר לסנכרון...</span>
        <button
          id="signOut"
          class="ghost"
          style="display: none; padding: 5px 9px; margin-right: 8px"
        >
          יציאה
        </button>
      </div>
      <section class="tools">
        <div class="search">
          <b>⌕</b><input id="search" placeholder="חיפוש לפי שם הספר" />
        </div>
        <select id="sort" class="select">
          <option value="recent">נוספו לאחרונה</option>
          <option value="priority">עדיפות</option>
          <option value="az">סדר האלף בית</option></select
        ><button id="view" class="ghost view">☷ רשימה</button
        ><button id="exportExcel" class="ghost">⇩ ייצוא ל־Excel</button
        ><a class="ghost toolLink" href="statistics.html">סטטיסטיקות</a
        ><a class="ghost toolLink" href="prices.html">השוואת מחירים</a
        ><a class="ghost toolLink" href="notifications.html">התראות</a
        ><a
          href="isbn.html"
          class="primary"
          style="
            text-decoration: none;
            border-radius: 13px;
            padding: 12px 14px;
            text-align: center;
            white-space: nowrap;
          "
          >▦ סריקת ISBN</a
        >
      </section>
      <section id="books"></section>
    </main>
    <button id="add" class="fab">+</button>
    <nav class="bottom">
      <div class="navs">
        <button class="nav active" data-status="מחפש"><span>⌕</span>מחפש</button
        ><button class="nav" data-status="בדיונים">
          <span>◌</span>משא ומתן</button
        ><button class="nav" data-status="מחכה לתשובה">
          <span>◷</span>מחכה</button
        ><button class="nav" data-status="מועדפים"><span>★</span>מועדפים</button
        ><button class="nav" data-status="השגתי"><span>✓</span>השגתי</button
        ><button class="nav" data-status="סל מחזור">
          <span>♲</span>סל מחזור
        </button>
      </div>
    </nav>
    <div id="modal" class="overlay">
      <div class="modal">
        <div class="head">
          <h2 id="modalTitle">הוספת ספר</h2>
          <button class="close">×</button>
        </div>
        <input id="id" type="hidden" /><input
          id="created"
          type="hidden"
        /><input id="coverData" type="hidden" />
        <div class="field">
          <label>שם הספר</label>
          <div class="row">
            <input id="bookTitle" /><button id="lookup" class="ghost">
              חיפוש כריכה בגוגל
            </button>
          </div>
        </div>
        <div id="results" class="results"></div>
        <div class="field"><label>שם הסופר</label><input id="author" /></div>
        <div class="field">
          <label>תמונת כריכה</label
          ><input id="image" type="file" accept="image/*" />
          <div id="previewWrap"></div>
        </div>
        <div class="field">
          <label>הערות</label><textarea id="notes"></textarea>
        </div>
        <div class="field">
          <label for="priority">רמת עדיפות</label>
          <select id="priority">
            <option value="רגילה">רגילה</option>
            <option value="גבוהה">גבוהה</option>
            <option value="דחופה">דחופה</option>
          </select>
        </div>
        <div class="choiceRow">
          <label><input id="isFavorite" type="checkbox" /> מועדף</label>
          <label><input id="isRequired" type="checkbox" /> ספר חובה</label>
        </div>
        <div class="fieldGrid">
          <div class="field">
            <label for="purchasePrice">מחיר ששולם בפועל</label>
            <input id="purchasePrice" type="number" min="0" step="0.01" />
          </div>
          <div class="field">
            <label for="newPrice">מחיר חדש להשוואה</label>
            <input id="newPrice" type="number" min="0" step="0.01" />
          </div>
        </div>
        <div class="field">
          <label for="acquiredAt">תאריך השגה</label>
          <input id="acquiredAt" type="date" />
        </div>
        <div class="actions">
          <button id="save" class="primary">שמירה</button
          ><button id="cancel" class="ghost">ביטול</button>
        </div>
      </div>
    </div>
    <div id="detailModal" class="overlay">
      <div class="modal">
        <div class="head">
          <h2>פרטי הספר</h2>
          <button class="close">×</button>
        </div>
        <div id="detail"></div>
      </div>
    </div>
    <div id="coverSearchModal" class="overlay">
      <div class="modal" style="width: min(850px, 100%)">
        <div class="head">
          <h2>איתור כריכה בעברית</h2>
          <button class="close">×</button>
        </div>
        <p class="sub">
          התוצאות מחפשות את שם הספר המדויק. בחר רק את הכריכה העברית הנכונה.
        </p>
        <div
          class="gcse-searchresults-only"
          data-gname="covers"
          data-defaultToImageSearch="true"
        ></div>
      </div>
    </div>
    <div id="authModal" class="overlay open">
      <div class="modal" style="max-width: 430px; align-self: center">
        <div class="head"><h2>כניסה למדף שלי</h2></div>
        <p>התחברות מאפשרת לסנכרן את הספרים בין כל המכשירים.</p>
        <div class="field">
          <label>כתובת אימייל</label
          ><input id="authEmail" type="email" autocomplete="email" />
        </div>
        <div class="field">
          <label>סיסמה</label
          ><input
            id="authPassword"
            type="password"
            minlength="6"
            autocomplete="current-password"
          />
        </div>
        <div class="actions">
          <button id="signIn" class="primary">כניסה</button
          ><button id="signUp" class="ghost">יצירת חשבון</button>
        </div>
        <p id="authMessage" class="sub"></p>
      </div>
    </div>
    <script
      async
      src="https://cse.google.com/cse.js?cx=c50b071c83d564187"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-client.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <script src="./excel-export.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
