<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#285f50">
  <title>המדף החסר</title>
  <style>
    :root{--ink:#17352d;--muted:#6d7f79;--paper:#f5f1e8;--card:#fffdf8;--green:#285f50;--green2:#dcebe4;--gold:#c7903b;--danger:#a94a45;--line:#e4ded2;--shadow:0 12px 35px rgba(33,58,48,.11)}
    *{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:Arial,sans-serif;min-height:100vh;padding-bottom:86px}button,input,textarea,select{font:inherit}button{cursor:pointer}.shell{max-width:1120px;margin:auto;padding:22px 18px}.top{display:flex;justify-content:space-between;gap:14px;align-items:center;margin-bottom:20px}.brand{display:flex;gap:12px;align-items:center}.logo{width:52px;height:52px;border-radius:16px;background:var(--green);color:#fff;display:grid;place-items:center;font-size:26px;box-shadow:var(--shadow)}h1{margin:0;font-size:27px}.sub{color:var(--muted);font-size:14px;margin-top:4px}.count{background:var(--green2);color:var(--green);padding:8px 12px;border-radius:99px;font-weight:700;white-space:nowrap}.sync{padding:9px 12px;border-radius:12px;background:#fff5dd;color:#785819;font-size:13px;margin-bottom:14px;border:1px solid #ecd7a0}.tools{display:grid;grid-template-columns:minmax(0,1fr) auto auto;gap:9px;margin-bottom:16px}.search{position:relative}.search input{width:100%;border:1px solid var(--line);border-radius:14px;padding:13px 43px 13px 14px;background:white;outline:none}.search b{position:absolute;right:15px;top:12px;color:var(--muted)}button,.select{border:0;border-radius:13px;padding:12px 14px}.select,.ghost{background:white;border:1px solid var(--line);color:var(--ink)}.primary{background:var(--green);color:#fff;font-weight:700}.danger{background:#fbe7e5;color:var(--danger);font-weight:700}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}.book{background:var(--card);border:1px solid var(--line);border-radius:19px;overflow:hidden;box-shadow:0 5px 18px rgba(42,61,53,.06);transition:.18s;position:relative}.book:hover{transform:translateY(-2px);box-shadow:var(--shadow)}.cover{height:235px;background:linear-gradient(145deg,#e5eee9,#eee5d6);display:flex;align-items:center;justify-content:center;overflow:hidden}.cover img{width:100%;height:100%;object-fit:contain}.fallback{width:74%;height:72%;background:var(--green);border-radius:7px 14px 14px 7px;color:white;display:flex;align-items:center;justify-content:center;text-align:center;padding:18px;font-weight:700;box-shadow:8px 9px 18px rgba(24,44,37,.18)}.body{padding:14px}.title{font-weight:800;line-height:1.35;margin-bottom:6px}.author{color:var(--muted);font-size:14px;min-height:19px}.badge{display:inline-block;margin:0 14px 13px;background:var(--green2);color:var(--green);border-radius:99px;padding:5px 9px;font-size:12px;font-weight:700}.badge.discuss{background:#fff0d8;color:#8b611c}.badge.got{background:#e2f0df;color:#3f7037}.badge.trash{background:#f3e7e5;color:#8b4c48}.list{display:flex;flex-direction:column;gap:9px}.list .book{display:grid;grid-template-columns:70px minmax(0,1fr) auto;align-items:center;padding:8px}.list .cover{height:82px;border-radius:12px}.list .body{padding:8px 13px}.list .fallback{font-size:10px;padding:6px}.list .badge{margin:0 10px}.empty{background:var(--card);border:1px solid var(--line);padding:54px 20px;text-align:center;border-radius:22px}.empty h2{margin:10px}.fab{position:fixed;left:24px;bottom:96px;width:58px;height:58px;border:0;border-radius:20px;background:var(--gold);color:#fff;font-size:31px;box-shadow:var(--shadow);z-index:8}.bottom{position:fixed;bottom:0;right:0;left:0;background:rgba(255,253,248,.97);border-top:1px solid var(--line);z-index:9}.navs{width:min(700px,100%);margin:auto;display:grid;grid-template-columns:repeat(4,1fr)}.nav{background:transparent;color:var(--muted);padding:10px 4px 8px;font-size:12px}.nav span{display:block;font-size:21px;margin-bottom:3px}.nav.active{color:var(--green);font-weight:800;background:linear-gradient(to top,var(--green2),transparent)}.overlay{position:fixed;inset:0;background:rgba(17,35,29,.52);display:none;align-items:flex-end;justify-content:center;z-index:20;padding:16px}.overlay.open{display:flex}.modal{background:var(--card);width:min(590px,100%);max-height:92vh;overflow:auto;border-radius:24px;padding:22px;box-shadow:var(--shadow)}.head{display:flex;justify-content:space-between;align-items:center}.head h2{margin:0}.close{width:36px;height:36px;border-radius:50%;padding:0;background:#eee9df}.field{margin:13px 0}.field label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);background:white;border-radius:12px;padding:12px;outline:none}.field textarea{min-height:88px;resize:vertical}.row{display:grid;grid-template-columns:1fr auto;gap:8px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:17px}.actions button{flex:1;min-width:110px}.results{display:grid;gap:7px;margin-top:8px}.result{display:grid;grid-template-columns:46px 1fr;gap:9px;align-items:center;background:white;border:1px solid var(--line);text-align:right}.result img{width:46px;height:62px;object-fit:contain}.preview{width:110px;height:145px;object-fit:contain;border-radius:10px;background:#eee}.toast{position:fixed;top:18px;left:50%;transform:translate(-50%,-120px);background:var(--ink);color:white;padding:12px 18px;border-radius:13px;z-index:40;transition:.25s;box-shadow:var(--shadow)}.toast.show{transform:translate(-50%,0)}
    @media(max-width:650px){.shell{padding:15px 12px}.logo{width:45px;height:45px}h1{font-size:23px}.tools{grid-template-columns:1fr auto}.select{grid-column:1}.view{grid-row:1;grid-column:2}.grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.cover{height:190px}.body{padding:11px}.fab{left:15px;bottom:86px}.overlay{padding:0}.modal{border-radius:24px 24px 0 0;max-height:94vh}.list .book{grid-template-columns:60px minmax(0,1fr)}.list .badge{grid-column:2;margin:0 13px 8px;width:max-content}.list .cover{height:72px}}
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>
  <main class="shell">
    <header class="top"><div class="brand"><div class="logo">▥</div><div><h1>המדף החסר</h1><div id="subtitle" class="sub">הספרים שאני מחפש</div></div></div><div id="count" class="count"></div></header>
    <div class="sync">הגרסה הנוכחית נשמרת במכשיר הזה. חיבור הסנכרון בין המכשירים יתווסף בשלב הבא.</div>
    <section class="tools"><div class="search"><b>⌕</b><input id="search" placeholder="חיפוש לפי שם הספר"></div><select id="sort" class="select"><option value="recent">נוספו לאחרונה</option><option value="az">סדר האלף בית</option></select><button id="view" class="ghost view">☷ רשימה</button></section>
    <section id="books"></section>
  </main>
  <button id="add" class="fab">+</button>
  <nav class="bottom"><div class="navs"><button class="nav active" data-status="מחפש"><span>⌕</span>מחפש</button><button class="nav" data-status="בדיונים"><span>◌</span>בדיונים</button><button class="nav" data-status="השגתי"><span>✓</span>השגתי</button><button class="nav" data-status="סל מחזור"><span>♲</span>סל מחזור</button></div></nav>
  <div id="modal" class="overlay"><div class="modal"><div class="head"><h2 id="modalTitle">הוספת ספר</h2><button class="close">×</button></div><input id="id" type="hidden"><input id="created" type="hidden"><input id="coverData" type="hidden"><div class="field"><label>שם הספר</label><div class="row"><input id="bookTitle"><button id="lookup" class="ghost">איתור פרטים</button></div></div><div id="results" class="results"></div><div class="field"><label>שם הסופר</label><input id="author"></div><div class="field"><label>תמונת כריכה</label><input id="image" type="file" accept="image/*"><div id="previewWrap"></div></div><div class="field"><label>הערות</label><textarea id="notes"></textarea></div><div class="actions"><button id="save" class="primary">שמירה</button><button id="cancel" class="ghost">ביטול</button></div></div></div>
  <div id="detailModal" class="overlay"><div class="modal"><div class="head"><h2>פרטי הספר</h2><button class="close">×</button></div><div id="detail"></div></div></div>
  <script>
    const INITIAL=["הסוד","חשוב והתעשר","הנזיר שמכר את הפרארי שלו","כוח בלתי מוגבל","הרגלים אטומיים","חוק החמש שניות","להעיר את הענק שבפנים","היה הגיבור של חייך","מועדון ה 5 בבוקר","להשיג הכול","אבא עשיר אבא עני","האיש העשיר ביותר בבבל","הפסיכולוגיה של הכסף","אשליית הכסף","מיליונר ברגע","סודות של מיליונרים","DotCom Secrets","מאפס לאחד","The 10X Rule","עקרון 80/20","השקעות לעצלנים","Deep Work","4 שעות עבודה בשבוע","לגרום לדברים לקרות","כוחו של הרגל","סדר את המיטה שלך","גריט","No Excuses","Clear Thinking","שבעת ההרגלים של אנשים אפקטיביים","100 דברים שאנשים מצליחים עושים","כיצד לרכוש ידידים והשפעה","מוקף באידיוטים","כוח. 48 החוקים","ארבע ההסכמות","ההסכמה החמישית","האומץ להעז","מי הזיז את הגבינה שלי","כך מקבלים החלטה","השפעה. הפסיכולוגיה של השכנוע","האדם מחפש משמעות","כוחו של הרגע הזה","האלכימאי","כוחו של התת מודע","לשבור את ההרגל להיות עצמכם","The Happiness Advantage","מהרס עצמי לערך עצמי","לחשוב מהר לחשוב לאט","כשהדברים מתפרקים","לממש את הטוב שבך","חוכמת האדישות","החיים שתמיד רצית","אהבה","מהפכת המשמעות","הפסיכולוגיה של האושר","אל תאמינו לכל מה שאתם חושבים","איינשטיין בזמן ובמרחב","להזמין מציאות","כוחה של שיחה","כוחו של מיקוד","ליצור מציאות","הקרבות הגדולים","אנושות 2.0","לא נשוב אחור"];
    const KEY='hamadaf-hahaser-v1'; const state={books:[],status:'מחפש',view:'grid',selected:null};
    const subtitles={'מחפש':'הספרים שאני מחפש','בדיונים':'ספרים שנמצאים בדיונים או במשא ומתן','השגתי':'ספרים שכבר השגתי','סל מחזור':'ספרים שהוסרו מהרשימה'};
    function init(){const saved=localStorage.getItem(KEY);state.books=saved?JSON.parse(saved):INITIAL.map((title,i)=>({id:crypto.randomUUID(),title,author:'',cover:'',notes:'',status:'מחפש',created:Date.now()-i}));persist();bind();render()}
    function bind(){search.oninput=render;sort.onchange=render;view.onclick=()=>{state.view=state.view==='grid'?'list':'grid';view.textContent=state.view==='grid'?'☷ רשימה':'▦ כרטיסיות';render()};add.onclick=openAdd;document.querySelectorAll('.nav').forEach(n=>n.onclick=()=>changePage(n));document.querySelectorAll('.close').forEach(b=>b.onclick=()=>b.closest('.overlay').classList.remove('open'));cancel.onclick=()=>modal.classList.remove('open');save.onclick=saveBook;lookup.onclick=findBook;image.onchange=loadImage;[modal,detailModal].forEach(m=>m.onclick=e=>{if(e.target===m)m.classList.remove('open')})}
    function persist(){localStorage.setItem(KEY,JSON.stringify(state.books))}
    function normalize(s){return String(s||'').toLowerCase().normalize('NFKD').replace(/[\u0591-\u05c7]/g,'').replace(/[^\u0590-\u05ffa-z0-9]/g,'')}
    function render(){const q=normalize(search.value);let list=state.books.filter(b=>b.status===state.status&&(!q||normalize(b.title).includes(q)));list.sort(sort.value==='az'?(a,b)=>a.title.localeCompare(b.title,'he'):(a,b)=>b.created-a.created);count.textContent=list.length+' ספרים';subtitle.textContent=subtitles[state.status];books.className=list.length?state.view:'';books.innerHTML=list.length?list.map(card).join(''):'<div class="empty"><div style="font-size:45px">▥</div><h2>אין כאן ספרים</h2><p>לא נמצאו ספרים במסך הזה.</p></div>';books.querySelectorAll('.book').forEach(el=>el.onclick=()=>openDetail(el.dataset.id))}
    function card(b){const cls=b.status==='בדיונים'?'discuss':b.status==='השגתי'?'got':b.status==='סל מחזור'?'trash':'';const c=b.cover?'<img src="'+esc(b.cover)+'">':'<div class="fallback">'+esc(b.title)+'</div>';return '<article class="book" data-id="'+b.id+'"><div class="cover">'+c+'</div><div class="body"><div class="title">'+esc(b.title)+'</div><div class="author">'+esc(b.author||'שם הסופר טרם הוזן')+'</div></div><span class="badge '+cls+'">'+b.status+'</span></article>'}
    function changePage(n){state.status=n.dataset.status;document.querySelectorAll('.nav').forEach(x=>x.classList.toggle('active',x===n));search.value='';render()}
    function openAdd(){state.selected=null;modalTitle.textContent='הוספת ספר';['id','created','bookTitle','author','coverData','notes'].forEach(x=>document.getElementById(x).value='');results.innerHTML='';previewWrap.innerHTML='';modal.classList.add('open')}
    async function findBook(){const title=bookTitle.value.trim();if(!title)return toast('צריך להזין שם ספר');lookup.disabled=true;lookup.textContent='מחפש';try{const r=await fetch('https://openlibrary.org/search.json?title='+encodeURIComponent(title)+'&limit=5');const data=await r.json();results._data=(data.docs||[]).map(x=>({title:x.title||'',author:(x.author_name||[]).join(', '),cover:x.cover_i?'https://covers.openlibrary.org/b/id/'+x.cover_i+'-M.jpg':''}));results.innerHTML=results._data.length?results._data.map((x,i)=>'<button class="result" data-i="'+i+'">'+(x.cover?'<img src="'+x.cover+'">':'<span></span>')+'<span><strong>'+esc(x.title)+'</strong><br><small>'+esc(x.author||'ללא שם סופר')+'</small></span></button>').join(''):'<div class="sync">לא נמצאו פרטים. אפשר להמשיך ידנית.</div>';results.querySelectorAll('.result').forEach(b=>b.onclick=()=>choose(+b.dataset.i))}catch(e){toast('איתור הפרטים לא הצליח')}finally{lookup.disabled=false;lookup.textContent='איתור פרטים'}}
    function choose(i){const x=results._data[i];bookTitle.value=x.title;author.value=x.author;coverData.value=x.cover;showPreview(x.cover);results.innerHTML=''}
    function loadImage(){const f=image.files[0];if(!f)return;if(f.size>4*1024*1024)return toast('התמונה גדולה מדי');const r=new FileReader();r.onload=()=>compress(r.result).then(data=>{coverData.value=data;showPreview(data)});r.readAsDataURL(f)}
    function compress(src){return new Promise(resolve=>{const img=new Image();img.onload=()=>{const max=700,scale=Math.min(1,max/Math.max(img.width,img.height)),c=document.createElement('canvas');c.width=img.width*scale;c.height=img.height*scale;c.getContext('2d').drawImage(img,0,0,c.width,c.height);resolve(c.toDataURL('image/jpeg',.75))};img.src=src})}
    function showPreview(src){previewWrap.innerHTML=src?'<img class="preview" src="'+src+'">':''}
    function saveBook(){const title=bookTitle.value.trim();if(!title)return toast('צריך להזין שם ספר');const duplicate=state.books.find(b=>normalize(b.title)===normalize(title)&&b.id!==id.value&&b.status!=='סל מחזור');if(duplicate)return toast('הספר כבר קיים ברשימה');const book={id:id.value||crypto.randomUUID(),title,author:author.value.trim(),cover:coverData.value,notes:notes.value.trim(),status:state.selected?state.selected.status:'מחפש',created:+created.value||Date.now()};const at=state.books.findIndex(b=>b.id===book.id);if(at>=0)state.books[at]=book;else state.books.unshift(book);persist();modal.classList.remove('open');toast('הספר נשמר');render()}
    function openDetail(bookId){const b=state.books.find(x=>x.id===bookId);state.selected=b;const c=b.cover?'<div class="cover" style="border-radius:16px"><img src="'+esc(b.cover)+'"></div>':'';let buttons='';if(b.status==='מחפש')buttons='<button class="ghost" data-move="בדיונים">העבר לבדיונים</button><button class="primary" data-move="השגתי">השגתי</button>';if(b.status==='בדיונים')buttons='<button class="ghost" data-move="מחפש">החזר למחפש</button><button class="primary" data-move="השגתי">השגתי</button>';if(b.status==='השגתי')buttons='<button class="ghost" data-move="מחפש">החזר למחפש</button>';if(b.status==='סל מחזור')buttons='<button class="primary" data-move="מחפש">שחזור</button>';if(b.status!=='סל מחזור')buttons+='<button class="danger" data-move="סל מחזור">לסל המחזור</button>';detail.innerHTML=c+'<h2>'+esc(b.title)+'</h2><p><strong>סופר:</strong> '+esc(b.author||'טרם הוזן')+'</p><p><strong>הערות:</strong> '+esc(b.notes||'אין הערות')+'</p><div class="actions"><button id="edit" class="ghost">עריכה</button>'+buttons+'</div>';edit.onclick=editBook;detail.querySelectorAll('[data-move]').forEach(x=>x.onclick=()=>moveBook(x.dataset.move));detailModal.classList.add('open')}
    function editBook(){const b=state.selected;detailModal.classList.remove('open');modalTitle.textContent='עריכת ספר';id.value=b.id;created.value=b.created;bookTitle.value=b.title;author.value=b.author;coverData.value=b.cover;notes.value=b.notes;results.innerHTML='';showPreview(b.cover);modal.classList.add('open')}
    function moveBook(status){const msg=status==='השגתי'?'האם להעביר את הספר לספרים שהשגתי?':status==='סל מחזור'?'האם להעביר את הספר לסל המחזור?':'האם להעביר את הספר?';if(!confirm(msg))return;state.selected.status=status;persist();detailModal.classList.remove('open');toast('הספר הועבר');render()}
    function toast(t){const x=document.getElementById('toast');x.textContent=t;x.classList.add('show');clearTimeout(x.timer);x.timer=setTimeout(()=>x.classList.remove('show'),2800)}function esc(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
    init();
  </script>
</body>
</html>
